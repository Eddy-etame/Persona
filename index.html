    <script>
      // Force le rechargement si un module dynamique (chunk) echoue (cas des mises a jour)
      window.addEventListener('error', (e) => {
        if (e.message && (e.message.includes('Failed to fetch dynamically imported module') || e.message.includes('Importing a stopped script'))) {
          console.warn('Chunk load error detected, reloading page...');
          window.location.reload();
        }
      }, true);
    </script>
